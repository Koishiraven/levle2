<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 写作伴侣 - 从创意碎片到故事大纲</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Kalam:wght@400;700&display=swap');

        :root {
            --board-size: 4000px;
            --paper-texture: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.08'/%3E%3C/svg%3E");
        }

        body, html {
            margin: 0; padding: 0;
            width: 100vw; height: 100vh;
            overflow: hidden; background: #121212;
            user-select: none;
        }

        /* 整个背景大画板 - 极致 CSS 木纹方案 */
        .board-container {
            position: absolute;
            width: var(--board-size);
            height: var(--board-size);
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            background-color: #121212;
            cursor: grab;
            z-index: 1;
            will-change: transform;
        }

        /* 专门的木纹质感层 */
        .wood-texture {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: #8b5a2b; 
            background-image: 
                radial-gradient(circle at center, transparent 0%, rgba(0,0,0,0.4) 100%),
                radial-gradient(ellipse at 20% 30%, rgba(60,30,10,0.3) 0%, transparent 150px),
                radial-gradient(ellipse at 80% 70%, rgba(60,30,10,0.3) 0%, transparent 200px),
                repeating-linear-gradient(45deg, rgba(0,0,0,0.3) 0px, rgba(0,0,0,0.3) 2px, transparent 2px, transparent 300px),
                repeating-linear-gradient(45deg, transparent 0px, transparent 2px, rgba(255,255,255,0.08) 3px, transparent 4px, transparent 300px),
                repeating-linear-gradient(45deg, rgba(40,20,5,0.1) 0px, rgba(40,20,5,0.1) 1px, transparent 1px, transparent 10px),
                linear-gradient(135deg, rgba(255,255,255,0.05) 0%, transparent 50%, rgba(0,0,0,0.1) 100%);
            background-size: 100% 100%;
            filter: url('#wood-filter'); 
            z-index: 1;
            pointer-events: none;
        }

        .board-vignette {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, transparent 20%, rgba(0,0,0,0.3) 100%);
            z-index: 2;
            pointer-events: none;
        }

        .board-container:active { cursor: grabbing; }

        /* 线索卡片 */
        .clue-card {
            position: absolute;
            width: 300px;
            padding: 25px;
            background-color: #fdfdfd;
            background-image: var(--paper-texture);
            box-shadow: 
                0 1px 2px rgba(0,0,0,0.2),
                0 10px 30px rgba(0,0,0,0.3),
                inset 0 0 50px rgba(0,0,0,0.02);
            transition: transform 0.25s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.2s ease;
            transform-origin: center;
            z-index: 10;
            cursor: move;
            border: 1px solid rgba(0,0,0,0.08);
        }

        .clue-card::after {
            content: "";
            position: absolute;
            bottom: 0; right: 0; width: 40px; height: 10px;
            background: rgba(0,0,0,0.1);
            filter: blur(5px);
            transform: rotate(3deg) translate(5px, 5px);
            z-index: -1;
            pointer-events: none;
        }

        /* 3D 大头钉 */
        .pushpin {
            position: absolute;
            top: 10px; left: 50%;
            transform: translateX(-50%);
            width: 22px; height: 22px;
            border-radius: 50%;
            z-index: 25;
            box-shadow: 
                0 3px 6px rgba(0,0,0,0.4),
                inset 0 -4px 6px rgba(0,0,0,0.3),
                inset 0 3px 4px rgba(255,255,255,0.7);
        }

        .pushpin-shine {
            position: absolute;
            top: 4px; left: 5px;
            width: 6px; height: 6px;
            background: rgba(255,255,255,0.8);
            border-radius: 50%;
            filter: blur(1px);
        }

        .pin-red { background: radial-gradient(circle at 35% 35%, #ff4d4d, #8b0000); }
        .pin-blue { background: radial-gradient(circle at 35% 35%, #4d94ff, #002b80); }
        .pin-silver { background: radial-gradient(circle at 35% 35%, #f2f2f2, #4d4d4d); }
        .pin-yellow { background: radial-gradient(circle at 35% 35%, #ffd633, #806600); }

        .clue-card.active {
            z-index: 1000 !important;
            box-shadow: 
                0 15px 40px rgba(0,0,0,0.4),
                0 30px 80px rgba(0,0,0,0.5);
        }

        .hero-card { 
            width: 500px; background-color: #fefcf0; z-index: 20; 
            border: 1px solid #e0d9b5;
        }

        .handwritten { font-family: 'Kalam', cursive; line-height: 1.4; }

        .ui-hint {
            position: fixed;
            top: 25px; left: 50%;
            transform: translateX(-50%);
            background: rgba(20,20,20,0.85);
            color: #e0e0e0;
            padding: 12px 35px;
            border-radius: 50px;
            font-size: 14px;
            z-index: 200;
            pointer-events: none;
            box-shadow: 0 5px 25px rgba(0,0,0,0.3);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
        }

        .card-y { background-color: #fffde7; }
        .card-b { background-color: #e3f2fd; }
        .card-g { background-color: #f1f8e9; }
        .card-p { background-color: #fce4ec; }
        .card-o { background-color: #fff3e0; }

        .svg-filters { position: absolute; width: 0; height: 0; visibility: hidden; }

        /* 图片卡片样式 */
        .image-card img {
            width: 100%;
            height: auto;
            border: 1px solid rgba(0,0,0,0.05);
            margin-bottom: 10px;
        }
    </style>
</head>
<body>

    <svg class="svg-filters">
        <filter id="wood-filter">
            <feTurbulence type="fractalNoise" baseFrequency="0.015 0.002" numOctaves="3" seed="5" result="noise" />
            <feDisplacementMap in="SourceGraphic" in2="noise" scale="25" xChannelSelector="R" yChannelSelector="G" />
        </filter>
    </svg>

    <div class="ui-hint handwritten">
        ✨ 欢迎来到 <b>AI 写作伴侣</b> | 拖拽背景平移 | 滚轮缩放 | 整理你的创意碎片
    </div>

    <div id="board" class="board-container">
        <div class="wood-texture"></div>
        <div class="board-vignette"></div>
        
        <!-- Hero Card -->
        <div id="hero" class="clue-card hero-card" style="top: 1850px; left: 1750px;">
            <div class="pushpin pin-red"><div class="pushpin-shine"></div></div>
            <div class="text-center p-6">
                <h1 class="text-4xl font-bold mb-4 handwritten text-red-900">AI 写作伴侣</h1>
                <p class="text-xl text-gray-800 mb-8 handwritten">
                    "帮脑子里已有故事世界的人，<br>把散落的创意碎片，自动编织成大纲。"
                </p>
                <div class="space-y-4">
                    <button class="w-full bg-red-900 text-white px-10 py-4 rounded-sm font-bold handwritten hover:bg-black transition-all shadow-xl text-lg">
                        开始我的故事调查 →
                    </button>
                    <p class="text-sm text-gray-500 handwritten">无需注册，即刻整理碎片</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        const board = document.getElementById('board');
        let isDraggingBoard = false;
        let isDraggingCard = false;
        let activeCard = null;
        let startX, startY;
        let currentX = 0, currentY = 0;
        let cardOffsetX, cardOffsetY;
        let currentScale = 1.0;
        let highestZIndex = 100;
        const MIN_SCALE = 0.2;
        const MAX_SCALE = 3.0;

        // 数据定义
        const featureCards = [
            { id: 'f1', title: '� 角色：李风', content: '15岁孤儿，倔强，望月宗新晋弟子。身怀不可告人的秘密。', color: 'border-l-4 border-blue-400', x: 1400, y: 1600 },
            { id: 'f2', title: '📍 场景：望月宗山门', content: '黄昏时分，云雾缭绕，台阶上布满青苔。这是命运开始的地方。', color: 'border-l-4 border-green-400', x: 2150, y: 1550 },
            { id: 'f3', title: '🔥 冲突：初次邂逅', content: '小瑶误会李风是闯入者，两人在山门前发生争执。', color: 'border-l-4 border-red-400', x: 2300, y: 2100 },
            { id: 'f4', title: '� 角色：小瑶', content: '16岁师姐，活泼开朗，实则内心孤独。擅长捉弄新人。', color: 'border-l-4 border-blue-400', x: 1800, y: 1300 },
            { id: 'p1', title: '🌱 体验版', content: '<div class="text-3xl font-bold my-2">¥0</div><p class="text-sm opacity-80 mb-4">初探灵感之径。包含基础线索画布、有限AI生成额度，适合记录每一个稍逝的火花。</p><ul class="text-xs space-y-1 opacity-70"><li>• 50张灵感卡片额度</li><li>• 基础情节生成</li><li>• 社区灵感广场访问</li></ul>', color: 'border-t-4 border-gray-400', x: 1500, y: 2450 },
            { id: 'p2', title: '� 专业版', content: '<div class="text-3xl font-bold my-2">¥39</div><p class="text-sm opacity-80 mb-4">全能创世神。解锁无限AI生成、高级微调面板及多时间线管理，让故事跃然纸上。</p><ul class="text-xs space-y-1 opacity-70"><li>• 无限卡片与画布空间</li><li>• 高级AI逻辑校验</li><li>• 全格式大纲导出</li></ul>', color: 'border-t-4 border-amber-500', x: 1900, y: 2450 },
            { 
                id: 'n1', 
                title: '📖 小说片段：望月宗往事', 
                content: '那是李风第一次见到师父发火。整个主峰的云气仿佛都被冻结了...（双击查看全文）', 
                fullContent: `
                    那是李风第一次见到师父发火。整个主峰的云气仿佛都被冻结了。
                    在望月宗的山门前，李风跪在坚硬的青石阶上，膝盖早已麻木。他能感觉到周围师兄弟们投来的复杂目光，有同情，有幸灾乐祸，但更多的是一种深深的恐惧。
                    “你可知罪？”师父的声音并不大，却像重锤一般敲在李风的心口。
                    李风低着头，双手紧紧攥成拳头，指甲嵌入掌心，带来一丝清晰的痛感。他没有说话，因为他知道，无论自己说什么，在师父眼中都不过是狡辩。
                    那是关于一个被尘封了十六年的秘密，一个关于望月宗禁地的秘密。李风在无意中闯入了那里，并看到了一些他不该看到的东西。那些闪烁着幽暗蓝光的符文，那些被锁链困住的哀嚎，以及那面刻满了不知名姓氏的石墙。
                    他想起了小瑶。小瑶曾警告过他，千万不要靠近后山的迷雾林，那是宗门的禁地。可他终究没能抵挡住内心那股莫名的牵引。
                    师父缓缓走下石阶，每一步都仿佛踩在李风的神经上。当师父停在他面前时，李风感受到了一股前所未有的压迫感。
                    “李风，你是宗门百年来天赋最高的弟子，我曾寄予你厚望。”师父叹了口气，语气中透出一丝难掩的失望，“可你终究还是触碰了那道底线。”
                    师父抬起手，指尖凝聚起一团纯净的白光。那是望月宗的至高法门——断缘指。一旦落下，李风的修为将被彻底废除，从此沦为凡人，并被逐出师门。
                    就在那道白光即将落下的一瞬，一道火红的身影突然从人群中冲出，挡在了李风面前。
                    “师父，求您开恩！”那是小瑶的声音，带着一丝颤抖，却无比坚定。
                    全场哗然。小瑶作为宗主的独女，竟然会为了一个犯下重罪的杂役弟子出头。
                    师父的手僵在了半空，眼中的怒火似乎在那一刻被冰雪浇熄，取而代之的是一种深深的哀伤。
                    “小瑶，让开。”师父的声音变得异常平静，平静得让人心寒。
                    “我不让！”小瑶大声喊道，眼眶微红，“李风是为了救我才闯入禁地的！那些妖兽袭击了我，如果不是他，我早就死在里面了！”
                    李风猛地抬起头，震惊地看着小瑶的背影。他从未告诉过任何人这件事，甚至连小瑶自己都不知道是他救了她。那天，他躲在暗处，用尽全身灵力发出一击后便昏迷了过去。
                    真相，往往比谎言更加伤人。在那个黄昏，望月宗的山门前，一个少年，一个少女，和一个被秘密笼罩的古老宗门，命运的齿轮开始了疯狂的旋转。
                `, 
                color: 'border-l-4 border-purple-500', 
                x: 1000, y: 2000 
            },
            { 
                id: 'n2', 
                title: '📖 小说片段：伦敦雨夜', 
                content: '贝克街的灯火在雨幕中显得摇摇欲坠。华生整理了一下大衣领子...（双击查看全文）', 
                fullContent: `
                    贝克街的灯火在雨幕中显得摇摇欲坠。华生整理了一下大衣领子，深深吸了一口湿冷的空气。伦敦的雨似乎永远没有停歇的意思，带着一股煤烟和马粪的混合气息。
                    “你听到了吗，华生？”福尔摩斯站在窗边，修长的身影在煤气灯下投射出诡异的阴影。
                    “除了雨声，我什么也没听到。”华生走到壁炉旁，试图让冻僵的手暖和一点。
                    福尔摩斯转过身，眼中闪烁着一种近乎疯狂的光芒。那是他进入破案状态时的标志性神情。
                    “脚步声。沉重，却又带着一种奇怪的节奏感。那是左腿受过伤的人特有的步法，而且他穿的是一双昂贵的牛津皮鞋，却在泥泞中走得很急。”
                    华生屏住呼吸。果然，片刻之后，一阵急促的敲门声打破了屋内的宁静。
                    门开了，一个浑身湿透的年轻人跌跌撞撞地闯了进来。他的脸色苍白如纸，眼神中充满了极度的恐惧，仿佛身后正跟着一个看不见的恶魔。
                    “救救我，福尔摩斯先生！救救我！”年轻人紧紧抓住福尔摩斯的袖子，指节因为用力而发白。
                    福尔摩斯优雅地请他坐下，并递上一杯热茶。“冷静点，莫顿先生。既然你能找到这里，说明事情还没到无可挽回的地步。现在，请告诉我，关于那张消失的遗嘱，以及那个出现在你窗边的红发男人。”
                    年轻人惊恐地瞪大了眼睛，“您怎么知道红发男人的事？我还没说一个字！”
                    福尔摩斯微微一笑，指了指年轻人袖口处的一根极细的红发，“在伦敦，像这种色泽的头发并不多见。而你外套上的抓痕显示，你在进屋前曾与人发生过激烈的拉扯。”
                    就在这时，窗外闪过一道刺眼的雷光。在雷光的映照下，华生看到窗玻璃上贴着一张扭曲的人脸。那是一张长满了雀斑、有着火红头发的面孔，正用一种令人毛骨悚然的目光注视着屋内。
                    “他在那里！”年轻人尖叫着从椅子上跳了起来。
                    等华生冲到窗边时，外面只剩下一片漆黑的雨幕。那张脸仿佛从未出现过一般，消失得无影无踪。
                    “看来，我们的客人并不仅仅是来寻求帮助的。”福尔摩斯低声自语，目光落在了年轻人刚才坐过的椅子垫缝里。
                    在那里，露出了一个小小的信封角，上面沾着血迹。
                    这场伦敦雨夜的追踪才刚刚拉开序幕。而在贝克街221B的房间里，三个人的命运已经紧紧交织在了一起。隐藏在迷雾背后的真相，正等待着那个天才的大脑去拨云见日。
                `, 
                color: 'border-l-4 border-gray-600', 
                x: 2500, y: 1700 
            }
        ];

        const imageFiles = [
            '微信图片_20260226115600_7_4.jpg',
            '微信图片_20260226115600_8_4.jpg',
            '微信图片_20260226115601_9_4.jpg',
            '微信图片_20260226115602_10_4.jpg',
            '微信图片_20260226115603_11_4.jpg',
            '微信图片_20260226115604_12_4.jpg'
        ];

        let basketItems = [];

        function init() {
            setupCardDragging(document.getElementById('hero'));
            
            // CTA 按钮跳转逻辑
            const ctaBtn = document.querySelector('.hero-card button');
            if (ctaBtn) {
                ctaBtn.id = 'cta-btn';
                ctaBtn.addEventListener('click', () => {
                    jumpTo(1700, 2550);
                });
            }

            featureCards.forEach(data => {
                const el = createCard(data.id, data.x, data.y, 'pin-blue', `
                    <h3 class="text-xl font-bold mb-2 handwritten">${data.title}</h3>
                    <div class="handwritten">${data.content}</div>
                `, data.color);
                
                if (data.fullContent) {
                    el.addEventListener('dblclick', () => {
                        openModal(data.title, data.fullContent);
                    });
                }
                setupCardDragging(el);
            });

            imageFiles.forEach((file, i) => {
                const angle = (i / imageFiles.length) * Math.PI * 2;
                const x = 2000 + Math.cos(angle) * 850;
                const y = 2000 + Math.sin(angle) * 850;
                const el = createCard(`img-${i}`, x, y, 'pin-red', `
                    <img src="${file}" draggable="false" class="rounded-sm mb-2">
                    <p class="text-xs text-center opacity-50 handwritten">灵感素材 #${i + 7}</p>
                `, 'p-3 w-64');
                setupCardDragging(el);
            });
            updateTransform();
        }

        function openModal(title, content) {
            const modal = document.getElementById('modal-overlay');
            if (!modal) return;
            const body = document.getElementById('modal-body');
            body.innerHTML = `<h2 class="text-3xl font-bold mb-6">${title}</h2><div class="whitespace-pre-wrap">${content}</div>`;
            modal.style.display = 'flex';
            setTimeout(() => modal.classList.add('active'), 10);
        }

        function closeModal() {
            const modal = document.getElementById('modal-overlay');
            if (!modal) return;
            modal.classList.remove('active');
            setTimeout(() => modal.style.display = 'none', 300);
        }

        function createCard(id, x, y, pinClass, html, extraClass) {
            const el = document.createElement('div');
            el.id = id;
            el.className = `clue-card ${extraClass}`;
            el.style.top = `${y}px`; el.style.left = `${x}px`;
            el.dataset.rotation = (Math.random() - 0.5) * 15;
            el.innerHTML = `<div class="pushpin ${pinClass}"><div class="pushpin-shine"></div></div>${html}`;
            board.appendChild(el);
            updateCardTransform(el);
            return el;
        }

        function setupCardDragging(el) {
            el.addEventListener('mousedown', (e) => {
                e.stopPropagation();
                isDraggingCard = true; activeCard = el;
                highestZIndex++; el.style.zIndex = highestZIndex;
                const rect = el.getBoundingClientRect();
                cardOffsetX = (e.clientX - rect.left) / currentScale;
                cardOffsetY = (e.clientY - rect.top) / currentScale;
                el.style.transition = 'none';
            });
        }

        function updateBasket() {
            const container = document.getElementById('basket-items-container');
            const placeholder = document.getElementById('basket-placeholder');
            const genBtn = document.getElementById('basket-generate-btn');
            if (!container || !placeholder || !genBtn) return;
            
            container.innerHTML = '';
            if (basketItems.length === 0) {
                placeholder.style.display = 'block';
                genBtn.style.display = 'none';
            } else {
                placeholder.style.display = 'none';
                basketItems.forEach((item, index) => {
                    const div = document.createElement('div');
                    div.className = 'basket-item';
                    div.innerHTML = `📄<div class="remove-btn" onclick="removeFromBasket(${index})">&times;</div>`;
                    div.title = item.title;
                    container.appendChild(div);
                });
                
                genBtn.style.display = basketItems.length > 2 ? 'block' : 'none';
            }
        }

        window.removeFromBasket = function(index) {
            const item = basketItems[index];
            const card = document.getElementById(item.id);
            if (card) card.style.display = 'block'; // 恢复显示
            basketItems.splice(index, 1);
            updateBasket();
        };

        function updateCardTransform(el) {
            const rot = el.classList.contains('active') ? 0 : (el.dataset.rotation || 0);
            const sc = el.classList.contains('active') ? 1.18 : 1.0;
            el.style.transform = `rotate(${rot}deg) scale(${sc})`;
        }

        function updateTransform() {
            board.style.transform = `translate(calc(-50% + ${currentX}px), calc(-50% + ${currentY}px)) scale(${currentScale})`;
            checkFocus();
        }

        // 平滑跳转到指定坐标
        function jumpTo(targetX, targetY) {
            board.style.transition = 'transform 1s cubic-bezier(0.65, 0, 0.35, 1)';
            currentX = 2000 - targetX;
            currentY = 2000 - targetY;
            currentScale = 1.0; // 跳转时恢复缩放倍率以便看清内容
            updateTransform();
            
            // 动画结束后移除过渡效果，以免影响拖拽感
            setTimeout(() => {
                board.style.transition = 'none';
            }, 1000);
        }

        window.addEventListener('wheel', (e) => {
            e.preventDefault();
            currentScale = Math.min(Math.max(currentScale - e.deltaY * 0.001, MIN_SCALE), MAX_SCALE);
            updateTransform();
        }, { passive: false });

        window.addEventListener('mousedown', (e) => {
            if (e.target.closest('.clue-card') || e.target.closest('#basket') || e.target.closest('#side-panel') || e.target.closest('.theme-switch')) return;
            isDraggingBoard = true;
            startX = e.clientX - currentX;
            startY = e.clientY - currentY;
        });

        window.addEventListener('mousemove', (e) => {
            if (isDraggingBoard) {
                currentX = e.clientX - startX;
                currentY = e.clientY - startY;
                updateTransform();
            } else if (isDraggingCard && activeCard) {
                const bRect = board.getBoundingClientRect();
                activeCard.style.left = `${(e.clientX - bRect.left) / currentScale - cardOffsetX}px`;
                activeCard.style.top = `${(e.clientY - bRect.top) / currentScale - cardOffsetY}px`;
                checkFocus();
            }
        });

        window.addEventListener('mouseup', (e) => {
            if (isDraggingCard && activeCard) {
                activeCard.style.transition = 'transform 0.25s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.2s ease';
                
                // 检查是否拖入了篮子
                const basket = document.getElementById('basket');
                if (basket) {
                    const basketRect = basket.getBoundingClientRect();
                    if (e.clientX >= basketRect.left && e.clientX <= basketRect.right &&
                        e.clientY >= basketRect.top && e.clientY <= basketRect.bottom) {
                        
                        const cardId = activeCard.id;
                        const cardTitle = activeCard.querySelector('h3') ? activeCard.querySelector('h3').innerText : '灵感卡片';
                        
                        // 防止重复加入
                        if (!basketItems.find(item => item.id === cardId)) {
                            basketItems.push({ id: cardId, title: cardTitle });
                            activeCard.style.display = 'none'; // 隐藏卡片
                            updateBasket();
                        }
                    }
                }
            }
            isDraggingBoard = isDraggingCard = false; activeCard = null;
        });

        function checkFocus() {
            const cx = window.innerWidth / 2, cy = window.innerHeight / 2;
            document.querySelectorAll('.clue-card').forEach(card => {
                if (card.style.display === 'none') return;
                const r = card.getBoundingClientRect();
                const dist = Math.sqrt(Math.pow(r.left + r.width/2 - cx, 2) + Math.pow(r.top + r.height/2 - cy, 2));
                const wasActive = card.classList.contains('active');
                const isActive = dist < 200 * currentScale;
                if (wasActive !== isActive) {
                    card.classList.toggle('active', isActive);
                    updateCardTransform(card);
                }
            });
        }

        init();
        window.addEventListener('resize', updateTransform);
    </script>
</body>
</html>
